name: code quality scans

on:
  push:
  workflow_dispatch:

jobs:
  run-flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: run flake8
        run: |
          flake8 ./pyvidplayer2 ./tests ./examples

  run-isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: install isort
        run: |
          python -m pip install --upgrade pip
          pip install isort

      - name: run isort
        run: |
          isort ./pyvidplayer2 --diff

  run-bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: run bandit
        run: |
          bandit -c bandit.yaml -r ./pyvidplayer2
