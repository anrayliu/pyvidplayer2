name: code quality scans

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: run flake8
        run: |
          flake8 --max-line-length=120 ./pyvidplayer2
        continue-on-error: true

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: run bandit
        run: |
          bandit -c bandit.yaml -r ./pyvidplayer2
        continue-on-error: true
