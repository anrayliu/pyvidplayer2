name: Bundle FFmpeg with release wheels

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg-cache
          key: ffmpeg-${{ runner.os }}-v1

      - name: Download FFmpeg - linux x64
        if: runner.os == 'Linux' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir ffmpeg-cache
          wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz
          cp ffmpeg-*/ffmpeg-*/ffmpeg ffmpeg-cache/
          cp ffmpeg-*/ffmpeg-*/ffprobe ffmpeg-cache/

      - name: Download FFmpeg - macos arm64
        if: runner.os == 'macOS' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir ffmpeg-cache
          wget https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-arm64
          cp ffmpeg-darwin-arm64 ffmpeg-cache/ffmpeg
          wget https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffprobe-darwin-arm64
          cp ffprobe-darwin-arm64 ffmpeg-cache/ffprobe

      - name: Download FFmpeg - windows x64
        if: runner.os == 'Windows' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          mkdir ffmpeg-cache
          Invoke-WebRequest https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip
          $ffmpeg = Get-ChildItem -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $probe = Get-ChildItem -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ffmpeg.FullName ffmpeg-cache/
          Copy-Item $probe.FullName ffmpeg-cache/

      - run: cp ffmpeg-cache/* pyvidplayer2/bin/ || true

      - name: Build wheel
        run: |
          python -m build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}
          path: dist/*.whl
